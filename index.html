<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Roguelike - Definitive Edition</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.8);
            --neon-green: #00ff66;
            --neon-red: #ff3366;
            --neon-blue: #00d2ff;
            --neon-gold: #ffb700;
            --neon-purple: #b624ff;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg-color) 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation;
            overflow: hidden;
        }

        #hud {
            display: flex;
            gap: 15px;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 600;
            background: var(--panel-bg);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            flex-wrap: wrap;
            justify-content: center;
        }

        #hud span {
            color: var(--neon-blue);
            text-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }

        #livesDisplay { color: var(--neon-red) !important; text-shadow: 0 0 5px rgba(255, 51, 102, 0.5) !important; }
        #highScoreDisplay { color: var(--neon-gold) !important; text-shadow: 0 0 5px rgba(255, 183, 0, 0.4) !important; }

        canvas {
            background-color: #111827;
            border: 3px solid var(--neon-green);
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.25);
            max-width: 85vw;
            max-height: 85vw;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 65px);
            grid-template-rows: repeat(3, 65px);
            gap: 12px;
            margin-top: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: var(--neon-green);
            border: 2px solid rgba(0, 255, 102, 0.3);
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.1s ease;
        }

        .btn:active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
            transform: scale(0.92);
        }

        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }
        
        #status {
            color: var(--neon-gold);
            min-height: 25px;
            font-size: 14px;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(255, 183, 0, 0.4);
            margin-bottom: 5px;
        }

        #cardOverlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 15, 26, 0.92);
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
        }

        #cardOverlay h2 {
            margin-bottom: 25px;
            color: #fff;
            font-size: 26px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .card-container {
            display: flex;
            gap: 16px;
            max-width: 95vw;
        }
        
        .card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 14px;
            width: 105px;
            height: 175px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15px 10px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 2px solid transparent;
            backdrop-filter: blur(4px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            user-select: none;
        }

        .card.comum { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }
        .card.raro { border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(182, 36, 255, 0.2); }

        .card:hover { transform: translateY(-8px) scale(1.03); }
        .card.comum:hover { box-shadow: 0 0 25px var(--neon-blue); }
        .card.raro:hover { box-shadow: 0 0 25px var(--neon-purple); }

        .card-rarity { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .card.comum .card-rarity { color: var(--neon-blue); }
        .card.raro .card-rarity { color: var(--neon-purple); }

        .card-icon { font-size: 36px; margin: 5px 0; }
        .card-title { font-size: 13px; font-weight: 700; color: #fff; }
        .card-desc { font-size: 10px; color: #94a3b8; line-height: 1.3; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="hud">
        <div>Tam: <span id="score">4</span></div>
        <div>Pontos: <span id="pointsDisplay">0</span></div>
        <div>Recorde: <span id="highScoreDisplay">0</span></div>
        <div>Vidas: <span id="livesDisplay">0</span></div>
    </div>
    <div id="status"></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
        <button class="btn up" id="btnUp">↑</button>
        <button class="btn left" id="btnLeft">←</button>
        <button class="btn right" id="btnRight">→</button>
        <button class="btn down" id="btnDown">↓</button>
    </div>

    <div id="cardOverlay">
        <h2>Escolha um Upgrade</h2>
        <div class="card-container" id="cardContainer"></div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        const tileCount = 20;
        let count = 0;
        let gamePaused = false;
        
        let baseSpeed = 6; 
        let gameSpeed = 6; 

        let snake = {
            x: 160, y: 160,
            dx: gridSize, dy: 0,
            cells: [], maxCells: 4
        };

        let apples = [{ x: 320, y: 320 }];
        let scorePoints = 0;
        let highScore = localStorage.getItem("snake_highscore") || 0;
        let lives = 0;
        let nextCardMilestone = 10; 

        let particles = [];
        let floatingTexts = [];

        let effects = {
            magnet: { active: false, timer: 0 },
            slow: { active: false, timer: 0 },
            ghost: { active: false, timer: 0 },
            double: false
        };

        const cardDeck = [
            { id: 'shrink', icon: '⚡', title: 'Redutor Super', desc: 'Diminui 8 blocos do seu corpo atual.', rarity: 'comum', chance: 45 },
            { id: 'life', icon: '❤️', title: 'Vida Extra', desc: 'Sobrevive a uma colisão com o corpo.', rarity: 'comum', chance: 40 },
            { id: 'slow', icon: '⏱️', title: 'Câmera Lenta', desc: 'Deixa o ritmo do jogo mais lento por 12s.', rarity: 'comum', chance: 30 },
            { id: 'ghost', icon: '👻', title: 'Fantasma', desc: 'Atravessa seu próprio corpo por 8s.', rarity: 'raro', chance: 20 },
            { id: 'magnet', icon: '🧲', title: 'Ímã', desc: 'Atrai as frutas próximas por 12s.', rarity: 'raro', chance: 15 },
            { id: 'double', icon: '✨', title: 'Multiplicador', desc: 'Nasce o dobro de frutas na arena.', rarity: 'raro', chance: 10 },
            { id: 'bonus', icon: '💎', title: 'Bônus', desc: 'Ganha +30 pontos direto sem crescer.', rarity: 'raro', chance: 10 }
        ];

        // --- SISTEMA DE EFEITOS SONOROS SINTETIZADOS (WEB AUDIO API) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            let now = audioCtx.currentTime;

            if (type === 'move') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                gainNode.gain.setValueAtTime(0.03, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } 
            else if (type === 'eat') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(523.25, now); // Nota C5
                osc.frequency.setValueAtTime(659.25, now + 0.08); // Nota E5
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } 
            else if (type === 'card') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.3);
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } 
            else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.2);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } 
            else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.6);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            }
        }

        document.getElementById('highScoreDisplay').innerText = highScore;

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function spawnApple() {
            if (apples.length >= 10) return;
            apples.push({ x: getRandomInt(0, tileCount) * gridSize, y: getRandomInt(0, tileCount) * gridSize });
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x + gridSize / 2,
                    y: y + gridSize / 2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    alpha: 1,
                    color: color,
                    size: getRandomInt(3, 6)
                });
            }
        }

        function createFloatingText(x, y, text, color) {
            floatingTexts.push({
                x: x, y: y,
                text: text, color: color,
                alpha: 1, vy: -0.5
            });
        }

        function drawWeightedCard() {
            let totalWeight = cardDeck.reduce((acc, card) => acc + card.chance, 0);
            let roll = Math.random() * totalWeight;
            let sum = 0;
            for (let card of cardDeck) {
                sum += card.chance;
                if (roll <= sum) return card;
            }
            return cardDeck[0];
        }

        function triggerCardSelection() {
            gamePaused = true;
            playSound('card'); // Som ao abrir cartas
            const overlay = document.getElementById('cardOverlay');
            const container = document.getElementById('cardContainer');
            container.innerHTML = ''; 

            let selectedCards = [];
            while (selectedCards.length < 3) {
                let drawn = drawWeightedCard();
                if (!selectedCards.some(c => c.id === drawn.id)) {
                    selectedCards.push(drawn);
                }
            }

            selectedCards.forEach(cardData => {
                const card = document.createElement('div');
                card.className = `card ${cardData.rarity}`;
                card.innerHTML = `
                    <div class="card-rarity">${cardData.rarity}</div>
                    <div class="card-icon">${cardData.icon}</div>
                    <div class="card-title">${cardData.title}</div>
                    <div class="card-desc">${cardData.desc}</div>
                `;
                card.onclick = () => applyCardEffect(cardData.id, cardData.icon);
                container.appendChild(card);
            });

            overlay.style.display = 'flex';
        }

        function applyCardEffect(cardId, icon) {
            createFloatingText(snake.x, snake.y - 15, icon, '#ffb700');
            playSound('eat'); // Feedback sonoro de ativação
            
            if (cardId === 'shrink') {
                snake.maxCells = Math.max(4, snake.maxCells - 8);
                while(snake.cells.length > snake.maxCells) snake.cells.pop();
            } else if (cardId === 'magnet') {
                effects.magnet.active = true;
                effects.magnet.timer = 70; 
            } else if (cardId === 'double') {
                effects.double = true;
                let currentTotal = apples.length;
                for(let i=0; i<currentTotal; i++) spawnApple();
            } else if (cardId === 'life') {
                lives++;
            } else if (cardId === 'slow') {
                effects.slow.active = true;
                effects.slow.timer = 70;
            } else if (cardId === 'ghost') {
                effects.ghost.active = true;
                effects.ghost.timer = 50;
            } else if (cardId === 'bonus') {
                scorePoints += 30;
                checkHighScore();
            }

            updateHUD();
            document.getElementById('cardOverlay').style.display = 'none';
            
            effects.slow.active = true;
            effects.slow.timer = Math.max(effects.slow.timer, 18); 

            gamePaused = false;
        }

        function updateHUD() {
            document.getElementById('score').innerText = snake.maxCells;
            document.getElementById('pointsDisplay').innerText = scorePoints;
            document.getElementById('livesDisplay').innerText = lives;
        }

        function checkHighScore() {
            if (scorePoints > highScore) {
                highScore = scorePoints;
                localStorage.setItem("snake_highscore", highScore);
                document.getElementById('highScoreDisplay').innerText = highScore;
            }
        }

        function handleTimers() {
            let statusText = "";
            
            if (scorePoints >= 200) baseSpeed = 4;
            else if (scorePoints >= 100) baseSpeed = 5;
            else baseSpeed = 6;

            gameSpeed = baseSpeed;

            if (effects.magnet.active) {
                effects.magnet.timer--;
                statusText += `🧲 Ímã (${Math.ceil(effects.magnet.timer/6)}s) `;
                if (effects.magnet.timer <= 0) effects.magnet.active = false;
            }
            if (effects.slow.active) {
                effects.slow.timer--;
                gameSpeed = baseSpeed + 6; 
                statusText += `⏱️ Segurança/Lentidão (${Math.ceil(effects.slow.timer/5)}s) `;
                if (effects.slow.timer <= 0) effects.slow.active = false;
            }
            if (effects.ghost.active) {
                effects.ghost.timer--;
                statusText += `👻 Fantasma (${Math.ceil(effects.ghost.timer/6)}s) `;
                if (effects.ghost.timer <= 0) effects.ghost.active = false;
            }
            document.getElementById('status').innerText = statusText;
        }

        function resetGame(diedFully) {
            if (diedFully) playSound('gameover'); // Som ao dar Game Over definitivo
            
            snake.x = 160; snake.y = 160;
            snake.cells = []; snake.maxCells = 4;
            snake.dx = gridSize; snake.dy = 0;
            apples = [{ x: getRandomInt(0, tileCount) * gridSize, y: getRandomInt(0, tileCount) * gridSize }];
            scorePoints = 0; lives = 0; nextCardMilestone = 10; baseSpeed = 6;
            effects.magnet.active = false; effects.slow.active = false;
            effects.ghost.active = false; effects.double = false;
            particles = []; floatingTexts = [];
            updateHUD();
            document.getElementById('status').innerText = "";
        }

        function loop() {
            requestAnimationFrame(loop);

            if (gamePaused) return;

            if (++count < gameSpeed) { 
                drawVisualEffectsOnly();
                return; 
            }
            count = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            handleTimers();

            // Toca som sutil de movimento
            playSound('move');

            snake.x += snake.dx; snake.y += snake.dy;

            if (snake.x < 0) { snake.x = canvas.width - gridSize; }
            else if (snake.x >= canvas.width) { snake.x = 0; }
            if (snake.y < 0) { snake.y = canvas.height - gridSize; }
            else if (snake.y >= canvas.height) { snake.y = 0; }

            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) { snake.cells.pop(); }

            if (effects.magnet.active) {
                apples.forEach(apple => {
                    let diffX = snake.x - apple.x;
                    let diffY = snake.y - apple.y;
                    if (Math.abs(diffX) <= gridSize * 3 && Math.abs(diffY) <= gridSize * 3) {
                        if (diffX > 0) apple.x += gridSize;
                        if (diffX < 0) apple.x -= gridSize;
                        if (diffY > 0) apple.y += gridSize;
                        if (diffY < 0) apple.y -= gridSize;
                    }
                });
            }

            apples.forEach((apple, index) => {
                ctx.fillStyle = '#ff3366';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff3366';
                ctx.fillRect(apple.x, apple.y, gridSize - 1, gridSize - 1);

                if (snake.x === apple.x && snake.y === apple.y) {
                    createExplosion(apple.x, apple.y, '#ff3366');
                    createFloatingText(apple.x, apple.y, '+10', '#ff3366');
                    playSound('eat'); // Som de comer fruta

                    snake.maxCells++;
                    scorePoints += 10;
                    apples.splice(index, 1);
                    checkHighScore();
                    updateHUD();

                    if (snake.maxCells >= nextCardMilestone) {
                        nextCardMilestone += 5;
                        triggerCardSelection();
                    }

                    if (effects.double) { spawnApple(); spawnApple(); } 
                    else { spawnApple(); }
                }
            });
            ctx.shadowBlur = 0;

            if (apples.length === 0) spawnApple();

            snake.cells.forEach(function(cell, index) {
                if (effects.ghost.active) {
                    ctx.fillStyle = `rgba(0, 255, 102, ${0.4 + Math.sin(Date.now() / 100) * 0.2})`;
                } else {
                    ctx.fillStyle = index === 0 ? '#00ff66' : '#00cc52'; 
                }
                
                ctx.fillRect(cell.x, cell.y, gridSize - 1, gridSize - 1);

                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        if (effects.ghost.active) continue; 

                        if (lives > 0) {
                            lives--;
                            playSound('hit'); // Som ao perder vida
                            createExplosion(cell.x, cell.y, '#ff3366');
                            createFloatingText(cell.x, cell.y, '-1 ❤️', '#ff3366');
                            snake.maxCells = Math.max(4, Math.floor(snake.maxCells * 0.7));
                            while(snake.cells.length > snake.maxCells) snake.cells.pop();
                            updateHUD();
                        } else {
                            resetGame(true);
                        }
                    }
                }
            });

            drawEfx();
        }

        function drawVisualEffectsOnly() {
            ctx.save();
            drawEfx();
            ctx.restore();
        }

        function drawEfx() {
            particles.forEach((p, index) => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
                if (p.alpha <= 0) { particles.splice(index, 1); } 
                else {
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
            });

            floatingTexts.forEach((t, index) => {
                t.y += t.vy; t.alpha -= 0.02;
                if (t.alpha <= 0) { floatingTexts.splice(index, 1); } 
                else {
                    ctx.globalAlpha = t.alpha; ctx.fillStyle = t.color;
                    ctx.font = "bold 12px 'Segoe UI', sans-serif";
                    ctx.fillText(t.text, t.x, t.y);
                }
            });
            ctx.globalAlpha = 1.0; 
        }

        function wrapperMove(dirFn) {
            initAudio(); // Ativa contexto de áudio na primeira interação do jogador
            dirFn();
        }

        function moveLeft() { if (snake.dx === 0) { snake.dx = -gridSize; snake.dy = 0; } }
        function moveUp() { if (snake.dy === 0) { snake.dy = -gridSize; snake.dx = 0; } }
        function moveRight() { if (snake.dx === 0) { snake.dx = gridSize; snake.dy = 0; } }
        function moveDown() { if (snake.dy === 0) { snake.dy = gridSize; snake.dx = 0; } }

        document.addEventListener('keydown', function(e) {
            if (gamePaused) return;
            initAudio();
            if (e.key === 'ArrowLeft') moveLeft();
            else if (e.key === 'ArrowUp') moveUp();
            else if (e.key === 'ArrowRight') moveRight();
            else if (e.key === 'ArrowDown') moveDown();
        });

        document.getElementById('btnLeft').addEventListener('click', () => wrapperMove(moveLeft));
        document.getElementById('btnUp').addEventListener('click', () => wrapperMove(moveUp));
        document.getElementById('btnRight').addEventListener('click', () => wrapperMove(moveRight));
        document.getElementById('btnDown').addEventListener('click', () => wrapperMove(moveDown));

        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); wrapperMove(moveLeft); });
        document.getElementById('btnUp').addEventListener('touchstart', (e) => { e.preventDefault(); wrapperMove(moveUp); });
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); wrapperMove(moveRight); });
        document.getElementById('btnDown').addEventListener('touchstart', (e) => { e.preventDefault(); wrapperMove(moveDown); });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
